global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'devops-vm'
    static_configs:
      - targets: ['192.168.56.10:9100']
        labels:
          instance: 'devops-vm'

  - job_name: 'monitoring-vm'
    static_configs:
      - targets: ['192.168.56.20:9100']
        labels:
          instance: 'monitoring-vm'
