name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          cd app
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/node-api:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/node-api:latest

      - name: Fix DNS
        run: echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf

      - name: Deploy sur Kubernetes
        run: |
          sudo kubectl apply -f k8s/mysql-pvc.yml
          sudo kubectl apply -f k8s/mysql-deployment.yml
          sudo kubectl apply -f k8s/mysql-service.yml
          sudo kubectl apply -f k8s/api-deployment.yml
          sudo kubectl apply -f k8s/api-service.yml
          sudo kubectl apply -f k8s/api-hpa.yml
          sudo kubectl rollout restart deployment/node-api
          sudo kubectl rollout status deployment/node-api --timeout=120s

      - name: Vérification
        run: sudo kubectl get pods
